dbs:
  - path: ./data/${DB_FILENAME}
    replicas:
      - access-key-id: ${MINIO_ACCESS_KEY}
        bucket: sssvpn
        endpoint: ${MINIO_ENDPOINT}
        name: sssvpn
        path: ${DB_MODE}
        region: eu-west-1
        retention: 12h
        secret-access-key: ${MINIO_SECRET_KEY}
        snapshot-interval: 30m
        type: s3

logging:
  level: warn
  stderr: false
  type: json
