# Gitleaks configuration for sss-vpn-astro
title = "SSS-VPN Gitleaks Config"

# Extend the default ruleset
[extend]
useDefault = true

# Allowlist specific paths and patterns
[allowlist]
paths = [
  # Test files with known dummy values
  ".env.test",
  # Lock file is too large and has no real secrets
  "pnpm-lock.yaml",
  # Build output
  "dist/",
  "build/",
  "node_modules/",
]

# Additional patterns to ignore (regex)
regexes = [
  # Hash-looking strings used in test data
  "^1234567890$",
  # Placeholder values used in documentation/examples
  "placeholder",
  # Version strings that look like secrets
  "^[0-9]+\\.[0-9]+\\.[0-9]+$",
  # Chatwoot public website token (client-side widget identifier)
  "yUi3b2qGBec28Q5RkANetFEM",
]
