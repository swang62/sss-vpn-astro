services:
  db:
    container_name: db
    environment:
      - SQLD_NODE=primary
      - SQLD_ENABLE_BOTTOMLESS_REPLICATION=true
      - LIBSQL_BOTTOMLESS_ENDPOINT=${MINIO_ENDPOINT}
      - LIBSQL_BOTTOMLESS_AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY}
      - LIBSQL_BOTTOMLESS_AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY}
      - LIBSQL_BOTTOMLESS_BUCKET=sssvpn-${NODE_ENV}
      - LIBSQL_BOTTOMLESS_AWS_DEFAULT_REGION=eu-west-1
      - RUST_LOG=info,bottomless=trace
    healthcheck:
      interval: 1m
      retries: 5
      start_period: 10s
      test: "sqld --version || exit 1"
      timeout: 5s
    image: ghcr.io/tursodatabase/libsql-server:latest
    ports:
      - 8888:8080
      - 5001:5001
    restart: unless-stopped
    volumes:
      - libsql:/var/lib/sqld

  sssvpn:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sssvpn
    depends_on:
      - db
    environment:
      - DB_PATH=http://db:8080
      - HOST_PORT=${HOST_PORT}
      - API_BASE_URL=${API_BASE_URL}
      - API_TOKEN=${API_TOKEN}
      - GTM_ID=${GTM_ID}
      - LOG_LEVEL=${LOG_LEVEL}
    healthcheck:
      interval: 1h
      retries: 5
      start_period: 10s
      test: "curl -fs http://localhost:${HOST_PORT}/api/status"
      timeout: 5s
    ports:
      - ${HOST_PORT}:${HOST_PORT}
    restart: unless-stopped

volumes:
  libsql:
