secrets:
  sentry_token:
    environment: SENTRY_TOKEN
  astro_key:
    environment: ASTRO_KEY

services:
  db:
    container_name: db
    environment:
      - SQLD_NODE=primary
      - SQLD_HTTP_AUTH=basic:${DB_AUTH_TOKEN:-default}
      - SQLD_ENABLE_BOTTOMLESS_REPLICATION=${MINIO_BACKUP:-false}
      - LIBSQL_BOTTOMLESS_ENDPOINT=${MINIO_ENDPOINT:-localhost}
      - LIBSQL_BOTTOMLESS_AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY:-secret}
      - LIBSQL_BOTTOMLESS_AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY:-secret}
      - LIBSQL_BOTTOMLESS_BUCKET=sssvpn-${NODE_ENV}
      - LIBSQL_BOTTOMLESS_AWS_DEFAULT_REGION=${MINIO_REGION:-eu-west-1}
      - RUST_LOG=info,bottomless=info
    healthcheck:
      interval: 5s
      retries: 5
      start_period: 5s
      test: "sqld --version || exit 1"
      timeout: 5s
    image: ghcr.io/tursodatabase/libsql-server:v0.24.32
    ports:
      - 8888:8080
      - 5001:5001
    restart: unless-stopped
    volumes:
      - libsql:/var/lib/sqld

  redis:
    command: redis-server --save 60 100 --appendonly yes --requirepass ${REDIS_PASS:-default}
    container_name: redis
    expose:
      - 6379
    healthcheck:
      interval: 5s
      retries: 5
      start_period: 5s
      test: redis-cli ping
      timeout: 5s
    image: redis:8.0-M01
    restart: unless-stopped
    volumes:
      - redis:/data

  sssvpn:
    build:
      args:
        - PUBLIC_GTM_ID
        - PUBLIC_SENTRY_DSN
        - SENTRY_ORG
        - SENTRY_PROJECT
        - SOURCE_COMMIT
        - SITE_URL
      context: .
      dockerfile: Dockerfile
      secrets:
        - sentry_token
        - astro_key
    container_name: sssvpn
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - BETTER_AUTH_SECRET
      - DB_REMOTE=${DB_REMOTE:-http://db:8080}
      - DB_AUTH_TOKEN=${DB_AUTH_TOKEN:-default}
      - HIDDIFY_API_KEY
      - LOG_LEVEL
      - POSTMARK_TOKEN
      - PUBLIC_SENTRY_DSN
      - REDIS_URL=${REDIS_URL:-redis:6379}
      - REDIS_PASS=${REDIS_PASS:-default}
      - SITE_URL
      - STRIPE_SECRET_KEY
      - STRIPE_WEBHOOK_SECRET
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 10s
      test: "curl -fs -o /dev/null http://localhost:4321"
      timeout: 5s
    image: swang62/sssvpn
    ports:
      - 4321:4321
    restart: unless-stopped

volumes:
  libsql:
  redis:
