services:
  db:
    container_name: db
    image: ghcr.io/tursodatabase/libsql-server:v0.24.26
    environment:
      - SQLD_NODE=primary
      - SQLD_HTTP_AUTH=basic:${DB_AUTH_TOKEN:-default}
      - SQLD_ENABLE_BOTTOMLESS_REPLICATION=${MINIO_BACKUP:-false}
      - LIBSQL_BOTTOMLESS_ENDPOINT=${MINIO_ENDPOINT}
      - LIBSQL_BOTTOMLESS_AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY}
      - LIBSQL_BOTTOMLESS_AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY}
      - LIBSQL_BOTTOMLESS_BUCKET=sssvpn-${NODE_ENV}
      - LIBSQL_BOTTOMLESS_AWS_DEFAULT_REGION=${MINIO_REGION}
      - RUST_LOG=info,bottomless=info
    healthcheck:
      interval: 5s
      retries: 5
      start_period: 5s
      test: "sqld --version || exit 1"
      timeout: 5s
    ports:
      - 8888:8080
      - 5001:5001
    restart: unless-stopped
    labels:
      - 'com.centurylinklabs.watchtower.enable=false'
    volumes:
      - libsql:/var/lib/sqld

  redis:
    container_name: redis
    image: redis:8.0-M01
    command: redis-server --save 60 100 --appendonly yes --requirepass ${REDIS_PASS:-default}
    healthcheck:
      interval: 5s
      retries: 5
      start_period: 5s
      test: redis-cli ping
      timeout: 5s
    ports:
      - 6379:6379
    restart: unless-stopped
    labels:
      - 'com.centurylinklabs.watchtower.enable=false'
    volumes:
      - redis:/data

  sssvpn:
    container_name: sssvpn
    image: swang62/sssvpn
    build:
      args:
        - PUBLIC_GTM_ID
        - SENTRY_PROJECT
        - SENTRY_DSN
        - SENTRY_TOKEN
        - SOURCE_COMMIT
        - SITE_URL
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - BETTER_AUTH_SECRET
      - DB_REMOTE=${DB_REMOTE:-http://db:8080}
      - DB_AUTH_TOKEN=${DB_AUTH_TOKEN:-default}
      - HIDDIFY_API_KEY
      - POSTMARK_TOKEN
      - REDIS_URL=${REDIS_URL:-redis:6379}
      - REDIS_PASS=${REDIS_PASS:-default}
      - STRIPE_SECRET_KEY
      - STRIPE_WEBHOOK_SECRET
      - LOG_LEVEL
    healthcheck:
      interval: 1m
      retries: 5
      start_period: 10s
      test: "curl -fs -o /dev/null http://localhost:4321"
      timeout: 5s
    labels:
      - 'com.centurylinklabs.watchtower.enable=false'
    ports:
      - 4321:4321
    restart: unless-stopped

volumes:
  libsql:
  redis:
