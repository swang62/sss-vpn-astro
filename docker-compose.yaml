services:
  sss-vpn:
    container_name: sss-vpn
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SECRET_CONFIG=${SECRET_CONFIG}
      - PUBLIC_CONFIG=${PUBLIC_CONFIG}
    ports:
      - 4321:4321
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - curl
        - "-f"
        - "http://localhost:4321"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
