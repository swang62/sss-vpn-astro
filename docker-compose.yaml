services:
  db:
    container_name: db
    environment:
      - SQLD_NODE=primary
    image: ghcr.io/tursodatabase/libsql-server:latest
    ports:
    - 8888:8080
    - 5001:5001
    restart: unless-stopped
    volumes:
      - libsql:/var/lib/sqld

  sssvpn:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sssvpn
    depends_on:
      - db
    environment:
      - DB_PATH=${DB_PATH}
      - HOST_DOMAIN=${HOST_DOMAIN}
      - HOST_PORT=${HOST_PORT}
      - LOG_LEVEL=${LOG_LEVEL}
    healthcheck:
      interval: 1m
      retries: 5
      start_period: 30s
      test: "curl -f http://localhost:${HOST_PORT}/api/status"
      timeout: 5s
    ports:
      - ${HOST_PORT}:${HOST_PORT}
    restart: unless-stopped

volumes:
  libsql:
