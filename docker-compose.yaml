services:
  db:
    container_name: db
    environment:
      - SQLD_NODE=primary
    healthcheck:
      interval: 1m
      retries: 5
      start_period: 10s
      test: "sqld --version || exit 1"
      timeout: 5s
    image: ghcr.io/tursodatabase/libsql-server:latest
    ports:
      - 8888:8080
      - 5001:5001
    restart: unless-stopped
    volumes:
      - libsql:/var/lib/sqld

  sssvpn:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sssvpn
    depends_on:
      - db
    environment:
      - DB_PATH=http://db:8080
      - HOST_DOMAIN=${HOST_DOMAIN}
      - HOST_PORT=${HOST_PORT}
      - LOG_LEVEL=${LOG_LEVEL}
    healthcheck:
      interval: 1h
      retries: 5
      start_period: 10s
      test: "curl -fs http://localhost:${HOST_PORT}/api/status"
      timeout: 5s
    ports:
      - ${HOST_PORT}:${HOST_PORT}
    restart: unless-stopped

volumes:
  libsql:
